<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cotizador Marmolería</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Roboto', sans-serif; background-color: #f5f5f5; color: #333; padding:20px; }
    h1, h3, h4 { color: #222; }
    .pieza { background-color:#fff; border-radius:6px; padding:15px; margin-bottom:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
    input { padding:5px; border-radius:4px; border:1px solid #ccc; margin-bottom:5px;}
    button { padding:8px 12px; border-radius:5px; background-color:#007BFF; color:white; border:none; cursor:pointer; margin-top:5px;}
    button:hover { background-color:#0056b3;}
    
    /* Resultado tipo planilla */
    .resultado {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 20px;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 1.2em;
      background-color: #fff;
      padding: 15px;
      border-radius: 6px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      margin-top: 15px;
    }
    .resultado span { display: inline-block; }
    
    img.logo { height:60px; display:block; margin-bottom:10px;}
  </style>
</head>
<body>

<img src="logo.png" alt="Logo Marmolería" class="logo">

<h1>Cotizador</h1>

<h3>Precio por m² (USD)</h3>
<input type="number" id="precioM2" placeholder="Precio por m²">

<!-- Piezas -->
<div class="pieza" id="cocina">
  <h3>Cocina</h3>
  <div class="secciones" id="cocina-secciones"></div>
  <button onclick="agregarSeccion('cocina','cocina')">Agregar sección</button>
</div>

<div class="pieza" id="isla">
  <h3>Isla</h3>
  <div class="secciones" id="isla-secciones"></div>
  <button onclick="agregarSeccion('isla','isla')">Agregar sección</button>
</div>

<div class="pieza" id="lavadero">
  <h3>Lavadero</h3>
  <div class="secciones" id="lavadero-secciones"></div>
  <button onclick="agregarSeccion('lavadero','lavadero')">Agregar sección</button>
</div>

<div class="pieza" id="bano">
  <h3>Baño</h3>
  <div class="secciones" id="bano-secciones"></div>
  <button onclick="agregarSeccion('bano','bano')">Agregar sección</button>
</div>

<div class="pieza" id="espacio_extra">
  <h3>Espacio Extra</h3>
  <div class="secciones" id="espacio_extra-secciones"></div>
  <button onclick="agregarEspacioExtra()">Agregar espacio</button>
</div>

<!-- TRAFOROS -->
<div class="pieza">
  <h3>Trafóros</h3>
  Grifería: <input type="number" id="grif"><br>
  Bacha: <input type="number" id="bacha"><br>
  Anafe: <input type="number" id="anafe"><br>
</div>

<!-- DESCUENTO -->
<div class="pieza">
  <h3>Descuento</h3>
  %: <input type="number" id="descuentoPorc" placeholder="%" style="width:60px;">
  Manual $: <input type="number" id="descuentoManual" placeholder="$" style="width:80px;"><br>
</div>

<button onclick="calcular()">Calcular</button>

<!-- Resultado tipo planilla -->
<div id="resultado" class="resultado"></div>

<script src="app.js"></script>
</body>
</html>
