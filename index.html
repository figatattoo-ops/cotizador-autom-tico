<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PRESUPUESTO ALTA STONE</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: #f8f9fa; }
    h1, h3 { text-transform: uppercase; }
    .section-box { border-radius:10px; padding:15px; margin-bottom:15px; background:linear-gradient(145deg,#fdf6f0,#f0f8ff); box-shadow:5px 5px 15px rgba(0,0,0,0.1),-3px -3px 10px rgba(255,255,255,0.7); text-transform:uppercase; }
    .section-title { font-weight:bold; margin-bottom:10px; }
    .subitem { font-size:0.9em; margin-left:15px; }
    table td, table th { padding:5px; }
    table { width:100%; }
    .subtotal-row { font-weight:bold; }
  </style>
</head>
<body class="p-4">

<h1>PRESUPUESTO ALTA STONE</h1>

<div id="grupos-container">

  <div class="section-box">
    <h3 class="section-title">Cocina</h3>
    <div class="mb-2">
      <label>Precio por m² (USD)</label>
      <input type="number" id="precio_m2_Cocina" class="form-control" value="100" step="0.01" onchange="calcularPresupuesto()">
    </div>
    <div id="Cocina-sections"></div>
    <button class="btn btn-primary btn-sm" onclick="agregarSeccion('Cocina')">Agregar sección</button>
  </div>

  <div class="section-box">
    <h3 class="section-title">Isla</h3>
    <div class="mb-2">
      <label>Precio por m² (USD)</label>
      <input type="number" id="precio_m2_Isla" class="form-control" value="100" step="0.01" onchange="calcularPresupuesto()">
    </div>
    <div id="Isla-sections"></div>
    <button class="btn btn-primary btn-sm" onclick="agregarSeccion('Isla')">Agregar sección</button>
  </div>

  <div class="section-box">
    <h3 class="section-title">Lavadero</h3>
    <div class="mb-2">
      <label>Precio por m² (USD)</label>
      <input type="number" id="precio_m2_Lavadero" class="form-control" value="100" step="0.01" onchange="calcularPresupuesto()">
    </div>
    <div id="Lavadero-sections"></div>
    <button class="btn btn-primary btn-sm" onclick="agregarSeccion('Lavadero')">Agregar sección</button>
  </div>

  <div class="section-box">
    <h3 class="section-title">Baño</h3>
    <div class="mb-2">
      <label>Precio por m² (USD)</label>
      <input type="number" id="precio_m2_Baño" class="form-control" value="100" step="0.01" onchange="calcularPresupuesto()">
    </div>
    <div id="Baño-sections"></div>
    <button class="btn btn-primary btn-sm" onclick="agregarSeccion('Baño')">Agregar sección</button>
  </div>

  <div class="section-box">
    <h3 class="section-title">Otro</h3>
    <div class="mb-2">
      <label>Precio por m² (USD)</label>
      <input type="number" id="precio_m2_Otro" class="form-control" value="100" step="0.01" onchange="calcularPresupuesto()">
    </div>
    <div id="Otro-sections"></div>
    <button class="btn btn-primary btn-sm" onclick="agregarSeccion('Otro')">Agregar sección</button>
  </div>

</div>

<div class="section-box">
  <h3 class="section-title">Traforos</h3>
  <div id="trafo-container-Bacha"></div>
  <div id="trafo-container-Anafe"></div>
  <div id="trafo-container-Griferia"></div>
</div>

<div class="section-box">
  <h3 class="section-title">Presupuesto Final</h3>
  <table class="table table-bordered">
    <tr><th>Concepto</th><th>USD</th></tr>
    <tr><td>m² Material</td><td id="subtotal-material"></td></tr>
    <tr><td>Zócalos</td><td id="subtotal-zocalos"></td></tr>
    <tr><td>Regruesos</td><td id="subtotal-regruesos"></td></tr>
    <tr><td>Alzada</td><td id="subtotal-alzada"></td></tr>
    <tr><td>Bacha integrada</td><td id="subtotal-bacha"></td></tr>
    <tr><td>Traforos</td><td id="subtotal-traforos"></td></tr>
    <tr><td>Medición, envío y colocación</td><td id="costo-colocacion"></td></tr>
    <tr class="subtotal-row"><td>Total antes de descuento</td><td id="total-before-discount"></td></tr>
    <tr><td>Descuento %</td><td><input type="number" id="descuento-porcentaje" value="0" onchange="calcularPresupuesto()"> %</td></tr>
    <tr><td>Descuento USD</td><td><input type="number" id="descuento-usd" value="0" onchange="calcularPresupuesto()"></td></tr>
    <tr class="subtotal-row"><td>Total final</td><td id="total-final"></td></tr>
  </table>
</div>

<script src="presupuesto.js"></script>
</body>
</html>
